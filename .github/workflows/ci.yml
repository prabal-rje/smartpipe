name: ci
on:
  schedule:
    - cron: "17 6 * * 1"  # weekly live-Ollama smoke (allowed-failure radar, plan/testing.md)
  push: { branches: [main] }
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  NO_COLOR: "1"
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "3.12" }
      - run: uv sync --all-extras
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run pyright
      - run: uv build && uvx twine check dist/*
      - run: make docs-check
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "${{ matrix.python }}" }
      - run: uv sync --all-extras
      - run: uv run coverage run -m pytest -q
      - run: uv run coverage report

  live-ollama-smoke:
    # Early-warning radar for Ollama API drift — never a gate (plan/testing.md §5).
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      ollama:
        image: ollama/ollama
        ports: ["11434:11434"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-extras
      - run: curl -s http://localhost:11434/api/pull -d '{"name":"qwen3:0.6b"}' > /dev/null
      - run: |
          echo "hola" | OLLAMA_HOST=http://localhost:11434 SMARTPIPE_MODEL=ollama/qwen3:0.6b \
            uv run smartpipe map "translate to English"
