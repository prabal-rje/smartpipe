name: release
on:
  push:
    tags: ["v*"]
jobs:
  # The full cross-platform matrix runs HERE, as the publish gate — releases
  # are rare, so this is where the macOS money is worth spending.
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    env:
      NO_COLOR: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "${{ matrix.python }}" }
      - run: uv sync --all-extras
      - run: uv run coverage run -m pytest -q
      - run: uv run coverage report

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (no token secret)
      contents: write # GitHub release
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "3.12" }
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Extract this version's changelog section
        run: |
          awk '/^## \[/{if (seen) exit; if ($0 !~ /Unreleased/) seen=1} seen' CHANGELOG.md > release-notes.md
          test -s release-notes.md || echo "See CHANGELOG.md" > release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*
