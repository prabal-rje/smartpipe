name: release
on:
  push:
    tags: ["v*"]
jobs:
  # The full cross-platform matrix runs HERE, as the publish gate — releases
  # are rare, so this is where the macOS money is worth spending.
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # 3.14 verifies the degraded tier: installable, core paths work,
        # document/whisper/local-embedding tests self-skip (upstream wheels)
        python: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    env:
      NO_COLOR: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "${{ matrix.python }}" }
      - run: uv sync --all-extras
      # behavior verification only - the coverage contract lives in ci `checks`
      - run: uv run pytest -q --tb=short -o faulthandler_timeout=120

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (no token secret)
      contents: write # GitHub release
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12" }
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Extract this version's changelog section
        run: |
          awk '/^## \[/{if (seen) exit; if ($0 !~ /Unreleased/) seen=1} seen' CHANGELOG.md > release-notes.md
          test -s release-notes.md || echo "See CHANGELOG.md" > release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*
